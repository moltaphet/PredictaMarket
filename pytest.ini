[pytest]
# Predicta direct-mode contract tests.
#
# These run in-memory against the gltest direct VM with mocked web/LLM — no server,
# no network, fully deterministic. `-p no:gltest` disables the network/integration
# plugin (which otherwise assumes a running localnet); the direct-mode plugin
# `gltest_direct` stays active and provides the fixtures.
#
#   python -m pytest        # run the suite
#   python -m pytest -v     # verbose
addopts = -p no:gltest
testpaths = contract/tests
