[pytest]
# Predicta integration tests — run against a LIVE GenLayer network.
#
# Unlike the direct-mode suite (root pytest.ini), these need the network/consensus
# plugin `gltest` ENABLED, so this config deliberately omits `-p no:gltest`. We
# disable the direct-mode plugin instead, the mirror image of the root config.
#
# Invoke with the gltest CLI and point pytest at this file so the root pytest.ini
# (which disables `gltest`) is not picked up:
#
#   gltest tests/integration -c tests/integration/pytest.ini -v -s
#   gltest tests/integration -c tests/integration/pytest.ini -v -s -m slow
#
# `hydra_pytest` (from the unrelated hydra-core in this environment) imports an antlr4
# build that breaks on Python 3.12+ — disable it so plugin loading doesn't crash.
addopts = -p no:gltest_direct -p no:hydra_pytest
testpaths = .
markers =
    slow: end-to-end test that does a live web scrape + LLM arbitration (minutes, nondeterministic)
